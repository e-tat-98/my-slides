name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          sudo npx playwright install-deps chromium
          # fonts-unifont は全 Unicode 文字を含む巨大フォントで fc-cache を何時間も
          # ブロックする。サムネイル生成には不要なので除去してから再構築する。
          sudo apt-get remove -y fonts-unifont 2>/dev/null || true
          sudo pkill -9 -f fc-cache 2>/dev/null || true
          sudo fc-cache -f -v 2>&1 | tail -3

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        timeout-minutes: 10

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: sudo npx playwright install-deps chromium

      - name: Build all slides
        run: pnpm --filter './slides/*' --parallel build

      - name: Generate thumbnails
        run: npx tsx scripts/gen-thumbnail.ts

      - name: Generate root index.html
        run: npx tsx scripts/gen-index.ts

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
